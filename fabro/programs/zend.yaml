version: 1
program: zend
target_repo: ../..
state_path: ../../.raspberry/zend-state.json
max_parallel: 1
units:
- id: private-control-plane
  title: Private Control Plane
  output_root: ../../outputs/private-control-plane
  artifacts:
  - id: control_plane_contract
    path: control-plane-contract.md
  - id: review
    path: review.md
  milestones:
  - id: reviewed
    requires:
    - control_plane_contract
    - review
  lanes:
  - id: private-control-plane
    kind: platform
    title: Private Control Plane Lane
    run_config: ../run-configs/bootstrap/private-control-plane.toml
    managed_milestone: reviewed
    produces:
    - control_plane_contract
    - review
- id: home-miner-service
  title: Home Miner Service
  output_root: ../../outputs/home-miner-service
  artifacts:
  - id: service_contract
    path: service-contract.md
  - id: review
    path: review.md
  milestones:
  - id: reviewed
    requires:
    - service_contract
    - review
  lanes:
  - id: home-miner-service
    kind: service
    title: Home Miner Service Lane
    run_config: ../run-configs/service_bootstrap/home-miner-service.toml
    managed_milestone: reviewed
    depends_on:
    - unit: private-control-plane
      lane: null
      milestone: reviewed
    produces:
    - service_contract
    - review
- id: command-center-client
  title: Command Center Client
  output_root: ../../outputs/command-center-client
  artifacts:
  - id: client_surface
    path: client-surface.md
  - id: review
    path: review.md
  milestones:
  - id: reviewed
    requires:
    - client_surface
    - review
  lanes:
  - id: command-center-client
    kind: interface
    title: Command Center Client Lane
    run_config: ../run-configs/bootstrap/command-center-client.toml
    managed_milestone: reviewed
    depends_on:
    - unit: private-control-plane
      lane: null
      milestone: reviewed
    - unit: home-miner-service
      lane: null
      milestone: reviewed
    produces:
    - client_surface
    - review
- id: hermes-adapter
  title: Hermes Adapter
  output_root: ../../outputs/hermes-adapter
  artifacts:
  - id: agent_adapter
    path: agent-adapter.md
  - id: review
    path: review.md
  milestones:
  - id: reviewed
    requires:
    - agent_adapter
    - review
  lanes:
  - id: hermes-adapter
    kind: platform
    title: Hermes Adapter Lane
    run_config: ../run-configs/bootstrap/hermes-adapter.toml
    managed_milestone: reviewed
    depends_on:
    - unit: private-control-plane
      lane: null
      milestone: reviewed
    - unit: home-miner-service
      lane: null
      milestone: reviewed
    produces:
    - agent_adapter
    - review
- id: proof-and-validation
  title: Proof And Validation
  output_root: ../../outputs/proof-and-validation
  artifacts:
  - id: validation_plan
    path: validation-plan.md
  - id: review
    path: review.md
  milestones:
  - id: reviewed
    requires:
    - validation_plan
    - review
  lanes:
  - id: proof-and-validation
    kind: platform
    title: Proof And Validation Lane
    run_config: ../run-configs/bootstrap/proof-and-validation.toml
    managed_milestone: reviewed
    depends_on:
    - unit: private-control-plane
      lane: null
      milestone: reviewed
    - unit: home-miner-service
      lane: null
      milestone: reviewed
    - unit: command-center-client
      lane: null
      milestone: reviewed
    - unit: hermes-adapter
      lane: null
      milestone: reviewed
    produces:
    - validation_plan
    - review
